name: Update Cert

on:
  schedule:
    - cron: '0 10 1 * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      cert_status: ${{ steps.analyze_result.outputs.cert_status }}
      cert_error: ${{ steps.analyze_result.outputs.cert_error }}
      cdn_update_status: ${{ steps.analyze_result.outputs.cdn_update_status }}
      deploy_status: ${{ steps.analyze_result.outputs.deploy_status }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare Environment
        run: |
          curl https://get.acme.sh | sh -s email=my@example.com
          pip install -r requirements.txt

      # ========== 步骤1：执行更新脚本（允许失败） ==========
      - name: 执行证书更新脚本
        id: run_update
        continue-on-error: true  # 关键：即使脚本失败也继续
        env:
          Tencent_SecretId: ${{ secrets.SECRETID }}
          Tencent_SecretKey: ${{ secrets.SECRETKEY }}
          DP_Id: ${{ secrets.DP_Id }}
          DP_Key: ${{ secrets.DP_Key }}
          CF_Token: ${{ secrets.CF_TOKEN }}
          CF_Account_ID: ${{ secrets.CF_ACCOUNT_ID }}
          ACME_DNS_TYPE: ${{ secrets.ACME_DNS_TYPE }}
          ACME_DOMAIN: ${{ secrets.ACME_DOMAIN }}
          SECRETID: ${{ secrets.SECRETID }}
          SECRETKEY: ${{ secrets.SECRETKEY }}
          CDN_DOMAIN: ${{ secrets.CDN_DOMAIN }}
          UPDATE_SSL: ${{ secrets.UPDATE_SSL }}
          ZONE_ID: ${{ secrets.ZONE_ID }}
          DELETE_OLD_CERTS: ${{ secrets.DELETE_OLD_CERTS }}
          PUSH_URL: ${{ secrets.PUSH_URL }}
          PURGE_URL: ${{ secrets.PURGE_URL }}
          ENABLE_HSTS: ${{ secrets.ENABLE_HSTS }}
          ENABLE_OCSP: ${{ secrets.ENABLE_OCSP }}
          ENABLE_HTTP2: ${{ secrets.ENABLE_HTTP2 }}
          CERT_HOME: /home/runner/.acme.sh
          ACME_HOME: /home/runner/.acme.sh
          WORK_DIR: .
        run: |
          # 执行脚本并保存所有输出到日志文件（同时显示在控制台）
          sh ./docker/update.sh 2>&1 | tee cert_update.log
          # 记录脚本的退出码
          echo "SCRIPT_EXIT_CODE=$?" >> $GITHUB_ENV

      # ========== 步骤2：分析结果并设置输出 ==========
      - name: 分析更新结果
        id: analyze_result
        if: always()  # 无论上一步成功与否都执行
        env:
          ACME_DOMAIN: ${{ secrets.ACME_DOMAIN }}
          CERT_HOME: /home/runner/.acme.sh
        run: |
          # 检查证书是否存在
          if [ -f "${CERT_HOME}/${ACME_DOMAIN}/fullchain.cer" ] || [ -f "${CERT_HOME}/${ACME_DOMAIN}_ecc/fullchain.cer" ]; then
            echo "cert_status=success" >> $GITHUB_OUTPUT
            echo "cert_error=证书文件存在" >> $GITHUB_OUTPUT
          else
            echo "cert_status=failed" >> $GITHUB_OUTPUT
            echo "cert_error=未找到证书文件，请检查 acme.sh 执行日志" >> $GITHUB_OUTPUT
          fi

          # 检查 CDN 更新是否成功（从日志中搜索关键信息）
          if [ -f "cert_update.log" ] && grep -q "成功更新域名为.*的CDN的ssl证书" cert_update.log 2>/dev/null; then
            echo "cdn_update_status=success" >> $GITHUB_OUTPUT
            echo "deploy_status=success" >> $GITHUB_OUTPUT
          else
            echo "cdn_update_status=failed" >> $GITHUB_OUTPUT
            echo "deploy_status=failed" >> $GITHUB_OUTPUT
            # 提取错误信息（如果有）
            if [ -f "cert_update.log" ]; then
              ERROR_MSG=$(tail -30 cert_update.log | grep -E "ERROR|error|Exception|失败|Invalid" | head -5 | tr '\n' '; ')
              echo "cert_error=CDN更新失败: ${ERROR_MSG:-请查看完整日志}" >> $GITHUB_OUTPUT
            fi
          fi

      # ========== 步骤3：钉钉通知 ==========
      - name: 钉钉通知
        uses: leafney/dingtalk-action@v1
        if: always()
        env:
          DINGTALK_ACCESS_TOKEN: ${{ secrets.DINGTALK_ACCESS_TOKEN }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
        with:
          msgtype: markdown
          title: 'GitHub Actions 证书更新通知'
          text: |
            ### ${{ job.status == 'success' && '✅' || '❌' }} 证书更新任务

            | 项目 | 详情 |
            | :--- | :--- |
            | **任务状态** | ${{ job.status == 'success' && '成功 ✅' || '失败 ❌' }} |
            | **证书申请状态** | ${{ steps.analyze_result.outputs.cert_status == 'success' && '✅ 成功' || '❌ 失败' }} |
            | **CDN SSL更新状态** | ${{ steps.analyze_result.outputs.cdn_update_status == 'success' && '✅ 成功' || '❌ 失败' }} |
            | **仓库** | [${{ github.repository }}](https://github.com/${{ github.repository }}) |
            | **分支** | `${{ github.ref_name }}` |
            | **触发时间** | ${{ github.event.head_commit.timestamp }} |
            | **提交信息** | ${{ github.event.head_commit.message }} |

            **📋 详细信息**：
            ${{ steps.analyze_result.outputs.cert_error || '无错误' }}

            > [🔗 查看运行详情](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
